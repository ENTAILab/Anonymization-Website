<!DOCTYPE html>
<html>
    <head>
        <title> Home Page</title>
        <link rel="stylesheet" type="text/css" href="/css/default.css"/>
        <link rel="stylesheet" type="text/css" href="/css/custom.css"/>

        <script src="/js/home.js" defer></script>
        <script src="js/errors.js" defer></script>
    </head>
    <body>

    <select id="modality">
        <option value=""></option>
    </select>

    <div id="method"></div>

    <!-- additional parameters needed for the website  -->
    <div id="parameters"></div>

    <!-- todo  adjust this to be PER modality once all modalities are implemented -->
    <div id="component-urls-div">
       <label for="entryBox-component">
           <input type="text" id="entryBox-component" name="uri" placeholder="Enter Component URL...">
       </label>

    </div>
 
    <label><input type="checkbox" id="view-toggle">Enable separate views </label>

    <!-- plain text input for text-anonymization -->
    <div id="text-input">
        <textarea id="text-input-area" name="text-input-area" placeholder="Enter text to be processed here..."></textarea>

    </div>
    <!-- file upload JSON / CAS -->
    <div id="file-input"></div>
    <!-- audio / image input -->


    <button id="process-btn">Process</button>

    <div id="error-popup" class="error-popup"></div>

    <div id="output">Waiting for results...</div>
    </body> 
</html>
